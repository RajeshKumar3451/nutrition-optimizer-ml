<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Optimizer - AI Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --warning: #e67e22; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
        }
        h2 { color: var(--dark); text-align: center; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        input {
            width: 100%; padding: 10px; border: 2px solid #ddd;
            border-radius: 8px; box-sizing: border-box; margin-bottom: 10px;
        }
        button {
            width: 100%; padding: 12px; background: var(--primary);
            color: white; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #27ae60; transform: translateY(-2px); }
        .result-box {
            margin-top: 1.5rem; padding: 1rem; border-radius: 8px;
            text-align: center; display: none; background: #e8f8f5; border: 1px solid var(--primary);
        }
        #prediction-text { color: var(--primary); font-size: 1.5rem; font-weight: 700; }
        .warning-msg {
            display: none; color: var(--warning); font-size: 0.8rem;
            margin-top: -5px; margin-bottom: 10px; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Nutrition Predictor</h2>
    
    <div class="input-group">
        <label>Current Weight (kg)</label>
        <input type="number" id="wt" placeholder="e.g. 85" step="0.1">
    </div>
    
    <div class="input-group">
        <label>Daily Protein (g)</label>
        <input type="number" id="prot" placeholder="e.g. 150">
    </div>

    <div class="input-group">
        <label>Calorie Deficit (kcal)</label>
        <input type="number" id="def" placeholder="e.g. 500">
        <div id="def-warning" class="warning-msg">⚠️ High deficit: Model accuracy may drop.</div>
    </div>

    <div class="input-group">
        <label>Protein per kg</label>
        <input type="number" id="ppk" placeholder="e.g. 1.8" step="0.01">
    </div>

    <button onclick="getPrediction()">Predict Weight Loss</button>

    <div id="resultBox" class="result-box">
        <p>Estimated Weekly Loss:</p>
        <div id="prediction-text">0.0 kg</div>
    </div>
</div>

<script>
    async function getPrediction() {
        const wtValue = parseFloat(document.getElementById('wt').value);
        const protValue = parseFloat(document.getElementById('prot').value);
        const defValue = parseFloat(document.getElementById('def').value);
        const ppkValue = parseFloat(document.getElementById('ppk').value);

        document.getElementById('def-warning').style.display = 'none';

        if (isNaN(wtValue) || isNaN(protValue) || isNaN(defValue) || isNaN(ppkValue)) {
            alert("Please fill all fields with valid numbers!");
            return;
        }

        if (defValue > 1000) {
            alert("⚠️ Warning: Deficits over 1000 kcal are outside the model's training range. The prediction might not be biologically accurate.");
            document.getElementById('def-warning').style.display = 'block';
        }

        if (wtValue < 40 || wtValue > 250) {
            alert("⚠️ Note: This model is optimized for weights between 40kg and 250kg.");
        }

        const calculatedPPK = (protValue / wtValue).toFixed(2);
        if (Math.abs(calculatedPPK - ppkValue) > 0.1) {
            alert(`🔍 Logic Check: Your Daily Protein (${protValue}g) / Weight (${wtValue}kg) is actually ${calculatedPPK}. Your 'Protein per kg' entry (${ppkValue}) doesn't match!`);
        }

        const payload = {
            protein_intake_g: protValue,
            calorie_deficit: defValue,
            current_weight_kg: wtValue,
            protein_per_kg: ppkValue
        };

        try {
            document.getElementById('prediction-text').innerText = "Analyzing...";
            document.getElementById('resultBox').style.display = 'block';

            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('prediction-text').innerText = data.predicted_weekly_loss_kg + " kg";
            } else {
                alert("Error: " + data.detail);
            }
        } catch (error) {
            alert("Could not connect to the Backend. Make sure Uvicorn is running!");
        }
    }
</script>

</body>
</html>
